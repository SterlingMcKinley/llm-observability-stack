version: '3.3'

services:
  llm-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-observability-app
    ports:
      - "8000:8000"
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      # Note: Local terminal environment has valid AWS or OpenAI credentials 
      # modify the code to hit live models.
    volumes:
      - ./app:/app

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus